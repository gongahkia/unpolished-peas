name: CI

on:
  pull_request:
  push:

jobs:
  downstream-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: script/test_downstream_fixture.sh

  required-zig-0-15-2:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: script/check_zig_version.sh
      - run: script/check_third_party_notices.py
      - run: script/test_core_without_sdl.sh
      - run: script/test_module_fixture.sh
      - run: script/check_no_legacy_lifecycle.sh
      - if: matrix.os == 'ubuntu-latest'
        run: script/validate_wsl.sh
      - run: zig fmt --check build.zig src examples templates
      - run: zig build test
      - run: zig build test-support
      - run: zig build test-modules
      - run: zig build test-peas
      - run: zig build test-starter
      - run: zig build test-docs
      - run: zig build docs
      - run: zig build test-replays
      - run: zig build test-fuzz
      - run: script/check_performance_budgets.sh
      - run: zig build check-examples
      - run: zig build test-sdl
      - run: zig build test-box2d
      - run: zig build test-scenes
      - run: script/test_packaged_assets.sh
      - if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install --yes glslang-tools spirv-cross xvfb libvulkan1 mesa-vulkan-drivers
      - if: matrix.os == 'ubuntu-latest'
        run: script/test_linux_package.sh
      - run: script/compile_shaders.sh
      - if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a env SDL_AUDIODRIVER=dummy UP_DIAGNOSTICS_ROOT=zig-out/diagnostics/runtime zig build run-bounce-sdl -- --frames 2
      - if: matrix.os == 'macos-latest'
        run: env SDL_AUDIODRIVER=dummy UP_DIAGNOSTICS_ROOT=zig-out/diagnostics/runtime zig build run-bounce-sdl -- --frames 2
      - if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a env RUN_GENERATED_PROJECT=1 script/test_downstream_fixture.sh
      - if: matrix.os == 'macos-latest'
        run: env RUN_GENERATED_PROJECT=1 script/test_downstream_fixture.sh
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diagnostics-${{ matrix.os }}
          path: |
            zig-out/scenes/*.png
            zig-out/*.ppm
            zig-out/performance/*.json
            zig-out/diagnostics/**/*
          if-no-files-found: warn

  renderer-conformance:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install --yes xvfb libvulkan1 mesa-vulkan-drivers
      - if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a env UP_RENDERER_CONFORMANCE_REQUIRE_GPU=1 zig build test-renderer-conformance
      - if: matrix.os == 'macos-latest'
        run: env UP_RENDERER_CONFORMANCE_REQUIRE_GPU=1 zig build test-renderer-conformance
      - if: matrix.os == 'windows-latest'
        run: zig build test-renderer-conformance
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: renderer-conformance-${{ matrix.os }}
          path: |
            zig-out/**/*.png
            zig-out/**/*.ppm
            zig-out/diagnostics/**/*
          if-no-files-found: warn

  sample-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [run-bounce, test-scenes, run-bounce-sdl, dev-bounce, run-minimal, run-audio, run-atlas, run-camera, run-tilemap, run-primitives, stress-audio-sdl]
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: sudo apt-get update && sudo apt-get install --yes xvfb libvulkan1 mesa-vulkan-drivers
      - run: xvfb-run -a script/run_sample_smoke.sh ${{ matrix.target }}
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sample-diagnostics-${{ matrix.target }}
          path: zig-out/diagnostics/**/*
          if-no-files-found: warn

  advisory-next-zig:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: master
      - run: zig version
      - run: zig build test
