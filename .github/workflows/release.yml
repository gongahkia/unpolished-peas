name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: script/test_macos_package.sh dist/macos
      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: dist/macos
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: sudo apt-get update && sudo apt-get install --yes xvfb libvulkan1 mesa-vulkan-drivers
      - run: script/test_linux_package.sh dist/linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: dist/linux
  publish:
    needs: [macos, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
      - run: |
          mkdir release-assets
          cp release/macos-release/unpolished-peas-bounce-macos-universal.zip release-assets/
          cp release/linux-release/unpolished-peas-bounce-linux-x86_64.tar.gz release-assets/
          (cd release-assets && sha256sum unpolished-peas-bounce-macos-universal.zip unpolished-peas-bounce-linux-x86_64.tar.gz > SHA256SUMS)
      - uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: release-assets/SHA256SUMS
      - if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --draft --title "${GITHUB_REF_NAME}" --generate-notes release-assets/unpolished-peas-bounce-macos-universal.zip release-assets/unpolished-peas-bounce-linux-x86_64.tar.gz release-assets/SHA256SUMS
