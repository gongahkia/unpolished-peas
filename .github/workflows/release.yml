name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with: { version: 0.15.2 }
      - run: script/test_macos_package.sh
      - uses: actions/upload-artifact@v4
        with: { name: macos-release; path: dist/macos }
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with: { version: 0.15.2 }
      - run: sudo apt-get update && sudo apt-get install --yes xvfb libvulkan1 mesa-vulkan-drivers
      - run: script/test_linux_package.sh
      - uses: actions/upload-artifact@v4
        with: { name: linux-release; path: dist/linux }
  publish:
    needs: [macos, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: release }
      - run: find release -type f -exec sha256sum {} \; | sort > SHA256SUMS
      - uses: actions/upload-artifact@v4
        with: { name: release-checksums; path: SHA256SUMS }
      - if: startsWith(github.ref, 'refs/tags/')
        env: { GH_TOKEN: ${{ github.token }} }
        run: gh release create "${GITHUB_REF_NAME}" --draft --title "${GITHUB_REF_NAME}" --generate-notes release/macos-release/unpolished-peas-bounce-macos-universal.zip release/linux-release/unpolished-peas-bounce-linux-x86_64.tar.gz SHA256SUMS
